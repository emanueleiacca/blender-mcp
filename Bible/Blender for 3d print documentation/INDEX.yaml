# Machine-readable metadata for Blender sub-KB.
#
# Bands:
#   A = core for the STL print-prep workflow (mesh repair, decimate, manifold check)
#   B = adjacent / reference (consulted occasionally)
#   C = out of scope (already moved to _archive/)
#
# solves_symptoms: keys aligned with the output of analyze_mesh_for_print:
#   non_manifold_edges, boundary_loops, disconnected_shells, degenerate_faces,
#   normals_inverted, dimensions_wrong, polycount_high, thin_walls,
#   overhangs, self_intersection, too_large_for_bed, not_oriented_for_print,
#   internal_membrane, interior_faces
#
# This file is parsed by blender-kb. INDEX.md remains the human-readable source
# of truth for titles and "Quando usarlo". This file only adds structured fields.


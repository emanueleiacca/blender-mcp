# Routing rules — analyze_mesh_for_print output → topic + action.
#
# Schema:
#   rules:
#     - id: Rxxx                        # stable identifier
#       priority: <int>                 # higher = applied first
#       when:                           # ALL conditions must match (AND)
#         <metric>: <match_expr>        # exact value OR "OP NUM" string
#       then:
#         topic_id: <topic>             # must exist in active KB
#         section: <anchor>             # optional, free text hint
#         playbook: <playbook_id>       # optional, must exist in playbooks/
#         expected_after:               # what the next analyze run should show
#           <metric>: <expected_value>
#         needs_user_input: false       # if true, kb_route signals "ask_user"
#       rationale: <short text>
#
# Match expressions for numeric metrics:
#   "> N"   "< N"   ">= N"   "<= N"   "== N"   "!= N"
# For strings/booleans: provide the exact value.
# `derived` metrics computed in the engine (see kb_route in server.py):
#   max_dimension_mm = max(dimensions_mm)
#   min_dimension_mm = min(dimensions_mm)
#   ratio_non_manifold = non_manifold_edges / max(1, edge_count)

rules:
  - id: R001
    priority: 110
    when:
      degenerate_faces: "> 0"
    then:
      topic_id: mesh_repair
      section: dissolve_degenerate
      playbook: repair_basic
      expected_after:
        degenerate_faces: 0
    rationale: >
      Facce degeneri sabotano Boolean, Remesh e il calcolo del signed volume.
      Vanno rimosse all'inizio prima di qualsiasi altra operazione.

  - id: R002
    priority: 100
    when:
      normals: all_inverted
    then:
      topic_id: mesh_repair
      section: recalc_normals
      playbook: recalc_normals
      expected_after:
        normals: consistent
    rationale: >
      Mesh chiusa con normali tutte invertite — fix immediato con
      normals_make_consistent(inside=False).

  # R002b covers PARTIAL inversion: signed volume is positive (mesh isn't
  # fully flipped), but a measurable percentage of faces points inward. Same
  # playbook because normals_make_consistent on a closed mesh propagates
  # outward orientation regardless of how many faces start flipped.
  - id: R002b
    priority: 98
    when:
      inverted_face_pct: "> 5"
      normals: consistent
    then:
      topic_id: mesh_repair
      section: recalc_normals
      playbook: recalc_normals
      expected_after:
        inverted_face_pct: "< 1"
    rationale: >
      Tra il 5% e il 95% delle facce ha normale invertita. Caso tipico
      Meshy/AI: sub-superficie ricostruita con winding errato (es. interno
      collo invertito vs volto outward). normals_make_consistent(inside=False)
      propaga la consistenza outward sull'intera mesh chiusa.

  - id: R009
    priority: 95
    when:
      max_dimension_mm: "< 1.0"
    then:
      topic_id: scale_detection
      section: diagnose_and_rescale
      needs_user_input: true
    rationale: >
      Mesh sotto 1mm: quasi certamente AI normalizzata a unit cube.
      Richiede target_mm dall'utente.

  - id: R009b
    priority: 95
    when:
      min_dimension_mm: "> 1000"
    then:
      topic_id: scale_detection
      section: diagnose_and_rescale
      needs_user_input: true
    rationale: >
      Mesh con dimensione minima > 1m: probabilmente in metri non in mm.
      Richiede target_mm dall'utente.

  - id: R003
    priority: 95
    when:
      disconnected_shells: "> 1"
    then:
      topic_id: multi_object_management
      section: split_then_decide
      needs_user_input: true
    rationale: >
      Più isole disconnesse. Se le shell minori sono < 1% del volume,
      remove_small_objects automatico; altrimenti chiedere se union, split,
      o lasciare al slicer.

  - id: R004
    priority: 90
    when:
      non_manifold_edges: "> 0"
      boundary_loops: "> 0"
    then:
      topic_id: mesh_repair
      section: fill_holes
      playbook: repair_basic
      expected_after:
        boundary_loops: 0
    rationale: >
      Mesh con buchi topologici. fill_holes(sides=8) chiude i loop piccoli.

  - id: R005
    priority: 85
    when:
      non_manifold_edges: "> 0"
      boundary_loops: 0
    then:
      topic_id: mesh_repair
      section: clean_non_manifold
      playbook: repair_aggressive
      expected_after:
        non_manifold_edges: 0
    rationale: >
      Non-manifold senza buchi: T-junction o vertex fan. Risolve con
      print3d_clean_non_manifold (3D Print Toolbox).

  - id: R006
    priority: 70
    when:
      face_count: "> 500000"
    then:
      topic_id: decimation_remesh
      section: decimate_collapse
      playbook: decimate_to_target
      expected_after:
        ready_to_slice: true
    rationale: >
      Poly count alto rallenta lo slicer senza beneficio visibile su FDM 0.4mm.
      Target 100-200k facce.

  - id: R008
    priority: 50
    when:
      max_dimension_mm: "> 256"
    then:
      topic_id: bisect_splitting
      section: split_for_bambu_a1
      needs_user_input: true
    rationale: >
      Volume Bambu A1 = 256x256x256mm. Oggetto più grande va diviso con
      registration pin per riassemblaggio.

  - id: R010
    priority: 65
    when:
      wall_thickness_p10_mm: "< 0.8"
    then:
      topic_id: wall_thickness_actionable
      section: decision_tree
      needs_user_input: true
    rationale: >
      Almeno il 10% delle facce ha spessore sotto 0.8mm (2 perimetri nozzle
      0.4mm). Tre scenari secondo la severità: Solidify globale +0.3mm,
      Solidify aggressivo +0.5mm con verifica visiva, o re-scale/re-design.
      Chiede all'utente perché la decisione cambia silhouette.

  - id: R010b
    priority: 80
    when:
      wall_thickness_p10_mm: "< 0.45"
    then:
      topic_id: wall_thickness_actionable
      section: caso_C
      needs_user_input: true
    rationale: >
      Spessori sotto 0.45mm: lo slicer salterà o stamperà come parete singola
      fragile. Priorità più alta di R010 perché blocca la stampa.

  # R011 sits at priority 108, just below R001 (110). R001 catches the initial
  # degenerate_faces > 0 case; R011 catches the SAME symptom AFTER a decimate.
  # Same playbook target (mesh_repair) but a specialised playbook
  # (post_decimate_cleanup) that also triangulates n-gons and merges with a
  # higher threshold.
  # R012 doesn't compete with R001/R011 — it's an optional alternative path that
  # only the assistant chooses when it detects "hard-surface" features that
  # Voxel Remesh would destroy. The routing engine evaluates all matches; the
  # priority just orders them. R012 stays below R001/R011 because degenerate
  # cleanup must happen first.
  - id: R012
    priority: 75
    when:
      non_manifold_edges: "> 0"
      face_count: "> 5000"
      watertight: false
    then:
      topic_id: decimation_remesh
      section: quadriflow
      playbook: quadriflow_preserve_edges
      expected_after:
        watertight: true
        non_manifold_edges: 0
    rationale: >
      Fallback per mesh non-watertight con feature da preservare (hard-surface
      AI, mech parts). QuadriFlow built-in produce mesh quad-dominant
      feature-aligned, manifold per costruzione. Alternativa a Voxel Remesh
      (R007) quando voxel_size dovrebbe essere troppo piccolo per preservare
      spigoli e ti aspetti RAM blow-up.

  - id: R011
    priority: 112
    when:
      degenerate_faces: "> 0"
      face_count: "< 200000"
    then:
      topic_id: decimation_remesh
      section: failure_modes
      playbook: post_decimate_cleanup
      expected_after:
        degenerate_faces: 0
    rationale: >
      degenerate_faces > 0 in una mesh sotto 200k facce è il pattern tipico
      "abbiamo appena decimato, sono comparsi sliver". Il playbook
      post_decimate_cleanup dissolve, merge a soglia leggermente più alta del
      repair_basic, triangola, e ricalcola normali.
      Quando NON dovrebbe scattare: se la mesh è ancora >200k (probabilmente
      non hai decimato ancora) il caso è R001 sul repair_basic standard.

  # R013 fires on sliver triangles (high aspect ratio) that AREN'T necessarily
  # zero-area-degenerate. They pass the degenerate_faces check but still cause
  # slicer artifacts. analyze_mesh_for_print exposes aspect_ratio_p95 as a
  # visual-inspection proxy specifically for this case.
  - id: R013
    priority: 105
    when:
      aspect_ratio_p95: "> 10"
      face_count: "< 200000"
    then:
      topic_id: decimation_remesh
      section: failure_modes
      playbook: post_decimate_cleanup
      expected_after:
        aspect_ratio_p95: "< 8"
    rationale: >
      Il 5% peggiore delle facce ha aspect ratio max/min > 10 — triangoli ad
      ago (sliver) tipici di Decimate COLLAPSE aggressivo. Non sono
      zero-area (R001 non li cattura) ma il slicer li renderizza come
      micro-gap o segnali di under-extrusion. post_decimate_cleanup
      dissolve degenerate + triangulate riduce l'aspect ratio.

  # R014 fires on significant overhang (rule 25 TESTING_LOG). Triggers a
  # support-strategy topic and prevents the assistant from defaulting to
  # "Support: Off" by intuition. analyze_mesh_for_print exposes
  # overhang_45_pct and quasi_flat_ceiling_pct specifically for this rule.
  - id: R014
    priority: 100
    when:
      overhang_45_pct: ">= 10"
    then:
      topic_id: support_strategy
      section: tree_support
      needs_user_input: false
      expected_after:
        overhang_45_pct: ">= 10"  # invariato: il fix è in slicer, non in mesh
    rationale: >
      Overhang area >= 10% a 45°: forme con sotto-emisferi/limoni/foglie
      pendenti, cactus con tubercoli, animali con pance e zampe. Mai dichiarare
      "no support" senza questo check (R25 TESTING_LOG). Il routing
      proposta è documentale (support_strategy topic) perché la decisione
      finale è in Bambu Studio: Tree Hybrid 45° è la scelta standard.

  # R015 fires on suspected internal membrane / "tela del fondo" in sculpt
  # assets. Heuristic: face_count alto + interior_face_pct via raycast > 5%.
  # Il check raycast richiede una chiamata separata a
  # compute_face_visibility_bvh PRIMA di applicare questa rule (= la rule
  # propone il topic_id, l'utente esegue la verifica raycast).
  - id: R015
    priority: 95
    when:
      face_count: ">= 100000"
      pca_thickness_ratio: "< 0.10"
    then:
      topic_id: membrane_removal
      section: stop_rule
      needs_user_input: true
      expected_after:
        interior_face_pct_sampled: "< 5"
    rationale: >
      Asset con > 100k facce + ratio PCA < 10% (= forma "appiattita / 2.5D")
      ha probabilità di contenere una "tela del fondo" decorativa intrinseca
      tipica di sculpt come alberi corallo, gabbie, decori ramificati. R31
      TESTING_LOG documenta che 8+ tecniche Blender-pure falliscono in
      questo caso. Il topic membrane_removal guida via filename check (R41)
      → PyMeshLab AO (R37) → BVHTree raycast (R38) → Meshmixer (R40).
      needs_user_input=true perché: (a) la verifica nomenclatura asset è
      manuale, (b) le tecniche AO/raycast richiedono export/re-import o
      modificano significativamente la mesh — non sono "fix automatici".

  # R016 fires on multi-foot Z misalignment (rule 29 TESTING_LOG).
  # Caso tipico: animali / figurine in posa naturalistica dove
  # `obj.location.z = -zmin` semplice mette UNA SOLA zampa sul bed,
  # le altre restano sospese.
  - id: R016
    priority: 100
    when:
      contact_points_count: ">= 3"
    then:
      topic_id: orientation_strategy
      section: multi_foot_plane_fit
      needs_user_input: false
      expected_after:
        contact_points_count: ">= 3"  # invariato: il fix è rotazione + Z=0
    rationale: >
      Asset con >= 3 punti di contatto al bed (Z < 0.5mm) è tipicamente un
      animale o figurina multi-piede. R29 TESTING_LOG: allineamento Z=0
      semplice NON BASTA — serve plane-fit SVD sulle N punte per allineare
      il piano dei piedi parallelo al bed. Il pre-export check (R36) deve
      verificare che TUTTI i punti previsti tocchino effettivamente Z=0
      entro tolleranza 0.5mm. La rule è informativa: alla prossima
      analyze_mesh_for_print dopo l'orient, contact_points_count deve
      rimanere stabile (= nessuna zampa "scomparsa" causa rotation troppo
      aggressiva).
